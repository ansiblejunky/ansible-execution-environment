---
# Ansible Builder Execution Environment
version: 3
build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: '--ignore-certs -vvv'
options:
  package_manager_path: /usr/bin/dnf
images:
  base_image:
    name: docker.io/redhat/ubi9:latest

dependencies:
  python_interpreter:
    package_system: "python3.11 python3.11-devel"
    python_path: "/usr/bin/python3.11" 
  ansible_core:
    package_pip: ansible-core
  ansible_runner:
    package_pip: ansible-runner
  galaxy:
    collections:
      - name: ansible.utils
      - name: community.general
      - name: community.windows
      - name: ansible.windows

  python:
    - psutil
    - six
    # WinRM https://docs.ansible.com/ansible/latest/user_guide/windows_winrm.html#what-is-winrm
    - pywinrm>=0.3.0

  system:
    - gcc [platform:rpm]
    - systemd-devel [platform:rpm]
    - pkgconf-pkg-config [platform:rpm]
    # Kerberos
    # https://docs.ansible.com/automation-controller/latest/html/administration/kerberos_auth.html
    - krb5-libs [platform:rpm] # Required by gssapi
    - krb5-devel [platform:rpm] # Required by gssapi
    - krb5-workstation [platform:rpm] # Required by gssapi
    # Optional, but useful to have in EE
    # - git [platform:rpm]
    # - wget [platform:rpm]
    # - curl [platform:rpm]
    # - jq [platform:rpm]
    # - rsync [platform:rpm]
    # - unzip [platform:rpm]
    # - tar [platform:rpm]
    # - sudo [platform:rpm]

additional_build_files:
  - src: files/krb5.conf # kerberos
    dest: configs

additional_build_steps:
  prepend_base:
    - RUN cat /etc/os-release
    - COPY _build/configs/krb5.conf /etc/krb5.conf # kerberos
    - > # azure-cli
     RUN $PKGMGR install -y dnf &&
     rpm --import https://packages.microsoft.com/keys/microsoft.asc &&
     dnf -y install -y https://packages.microsoft.com/config/rhel/9.0/packages-microsoft-prod.rpm &&
     $PKGMGR -y install azure-cli
     
  append_base:
    - RUN $PYCMD -m pip install --upgrade pip setuptools wheel

  prepend_galaxy:
    - ARG ANSIBLE_GALAXY_SERVER_LIST
    - ARG ANSIBLE_GALAXY_SERVER_CERTIFIED_URL
    - ARG ANSIBLE_GALAXY_SERVER_CERTIFIED_AUTH_URL
    - ARG ANSIBLE_GALAXY_SERVER_CERTIFIED_TOKEN
    - ARG ANSIBLE_GALAXY_SERVER_VALIDATED_URL
    - ARG ANSIBLE_GALAXY_SERVER_VALIDATED_AUTH_URL
    - ARG ANSIBLE_GALAXY_SERVER_VALIDATED_TOKEN
    - ARG ANSIBLE_GALAXY_SERVER_COMMUNITY_URL

  append_final:
    - RUN $PYCMD -m pip check
    - >
      RUN $PKGMGR update -y &&
      $PKGMGR clean all &&
      rm -rf /var/cache/{dnf,yum} &&
      rm -rf /var/lib/dnf/history.* &&
      rm -rf /var/log/*
