[galaxy]
#server_list = automation_hub, my_org_hub, release_galaxy, test_galaxy, my_galaxy_ng
server_list = automation_hub, release_galaxy

[galaxy_server.automation_hub]
url=https://console.redhat.com/api/automation-hub/content/6047852-synclist/
auth_url=https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
# Get the token from https://console.redhat.com/ansible/automation-hub/token/ and set this environment variable
#export ANSIBLE_GALAXY_SERVER_AUTOMATION_HUB_TOKEN="token_value"

[galaxy_server.release_galaxy]
url=https://galaxy.ansible.com
# Get the token from https://galaxy.ansible.com/me/preferences and set this environment variable
#export ANSIBLE_GALAXY_SERVER_RELEASE_GALAXY_TOKEN="token_value"
